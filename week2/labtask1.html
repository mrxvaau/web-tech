<!DOCTYPE html>
<html>

<head>
    <title>Registration Page</title>
</head>

<body>

    <table width="100%" border="0" cellpadding="10">
        <tr>
            <td valign="top" width="60%">
                <h1><b>Registration Page</b></h1>
            </td>
            <td valign="top" width="40%">
            </td>
        </tr>

        <tr>
            <td valign="top">
                <fieldset>
                    <legend><b>General information:</b></legend>
                    <table border="0" cellpadding="5" width="100%">
                        <tr>
                            <td valign="top">
                                <table border="0" cellpadding="5">
                                    <tr>
                                        <td align="center"><b>First name</b></td>
                                        <td align="center">:</td>
                                        <td align="center">John</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Last name</b></td>
                                        <td align="center">:</td>
                                        <td align="center">Doe</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Gender</b></td>
                                        <td align="center">:</td>
                                        <td align="center">Male</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Father's name</b></td>
                                        <td align="center">:</td>
                                        <td align="center">Richard Doe</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Mother's name</b></td>
                                        <td align="center">:</td>
                                        <td align="center">Jane Doe</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Blood group</b></td>
                                        <td align="center">:</td>
                                        <td align="center">O+</td>
                                    </tr>
                                    <tr>
                                        <td align="center"><b>Religion</b></td>
                                        <td align="center">:</td>
                                        <td align="center">Islam</td>
                                    </tr>
                                </table>
                            </td>

                            <td valign="middle" align="center">
                                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
                                    alt="Person placeholder" width="120" height="120"><br><br>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </td>

            <td valign="top">
                <fieldset>
                    <legend><b>Contact information:</b></legend>
                    <table border="0" cellpadding="5" width="100%">
                        <tr>
                            <td align="center"><b>Email</b></td>
                            <td align="center">:</td>
                            <td align="center">****</td>
                        </tr>
                        <tr>
                            <td align="center"><b>Phone/mobile</b></td>
                            <td align="center">:</td>
                            <td align="center">****</td>
                        </tr>
                        <tr>
                            <td align="center"><b>Website</b></td>
                            <td align="center">:</td>
                            <td align="center">****</td>
                        </tr>
                        <tr>
                            <td align="center"><b>Present address</b></td>
                            <td align="center">:</td>
                            <td align="center">****</td>
                        </tr>
                    </table>
                </fieldset>
            </td>
        </tr>
    </table>

</body>

</html>
